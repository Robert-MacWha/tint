[package]
name = "tint"
version = "0.1.0"
edition = "2024"

[features]
default = []
parallel = ["ark-groth16/parallel"]
asm = ["ark-ff/asm"]
print-trace = ["ark-std/print-trace"]

[dependencies]
alloy-primitives = { workspace = true }
alloy-provider = { workspace = true }
alloy-rpc-types-eth = { workspace = true }
alloy-sol-macro = { workspace = true, features = ["json"] }
alloy-sol-types = { workspace = true }
ark-bn254 = { workspace = true, default-features = false }
ark-ff = { workspace = true, default-features = false }
ark-groth16 = { workspace = true, default-features = false }
ark-snark = { workspace = true, default-features = false }
ark-r1cs-std = { workspace = true, default-features = false }
ark-relations = { workspace = true, default-features = false }
async-trait = { workspace = true }
ruint = { workspace = true, features = ["ark-ff-06"] }
thiserror = { workspace = true }
tracing = { workspace = true }
x25519-dalek = { workspace = true, features = ["static_secrets"] }
chacha20poly1305 = { workspace = true }
hkdf = { workspace = true }
sha2 = { workspace = true }
rand_core = { workspace = true, features = ["getrandom"] }
tokio = { workspace = true, features = ["rt-multi-thread", "macros"] }
ark-std = { workspace = true }
postcard = { workspace = true, features = ["use-std"] }
serde = { workspace = true }
taceo-poseidon2 = { path = "../../../../eddsa-babyjubjub/poseidon2", features = [
    "t2",
    "t3",
    "t8",
] }
serde_with = { workspace = true }
ark-serialize = { workspace = true }
brotli = { workspace = true }

[dev-dependencies]
circuit-profiler = { workspace = true }
alloy-node-bindings = { workspace = true }
alloy-signer-local = { workspace = true }
anyhow = { workspace = true }
insta = { workspace = true }
serde_json = { workspace = true }
criterion = { workspace = true }
tracing-subscriber = { workspace = true, features = ["env-filter"] }
alloy-contract = { workspace = true }

[[bench]]
name = "groth16_constraints"
harness = false

[[bench]]
name = "groth16_matrices"
harness = false

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom_02 = { package = "getrandom", version = "0.2", features = ["js"] }
