[package]
name = "tint-rs"
version = "0.1.0"
edition = "2024"

[dependencies]
alloy = "2.1.0"
ark-bn254 = "0.6.0"
ark-circom = "0.6.0" # TODO: Remove me.  I pull in wasmer, which is very overkill since we don't need it for witness calculation
ark-ff = "0.6.0"
ark-groth16 = "0.6.0"
ark-relations = "0.6.0"
async-trait = "0.1.89"
circom-witness-rs = "0.2.3"
ruint = { version = "1.19.0", features = ["ark-ff-06"] }
thiserror = "2.0.18"

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom_02 = { package = "getrandom", version = "0.2", features = ["js"] }
