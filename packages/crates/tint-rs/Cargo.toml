[package]
name = "tint-rs"
version = "0.1.0"
edition = "2024"

[features]
default = []
parallel = ["ark-groth16/parallel"]
asm = ["ark-ff/asm"]
print-trace = ["ark-std/print-trace"]

[dependencies]
alloy-primitives = "1.6.0"
alloy-provider = "1.6.0"
alloy-rpc-types-eth = "1.6.0"
alloy-sol-macro = { version = "1.6.0", features = ["json"] }
alloy-sol-types = "1.6.0"
alloy-transport-http = "1.6.0"
ark-bn254 = { version = "0.6.0", default-features = false }
ark-crypto-primitives = { version = "0.6.0", features = [
    "crh",
    "merkle_tree",
    "constraints",
] }
ark-ff = { version = "0.6.0", default-features = false }
ark-groth16 = { version = "0.6.0", default-features = false }
ark-snark = { version = "0.6.0", default-features = false }
ark-r1cs-std = { version = "0.6.0", default-features = false }
ark-relations = { version = "0.6.0", default-features = false }
async-trait = "0.1.89"
ruint = { version = "1.19.0", features = ["ark-ff-06"] }
thiserror = "2.0.18"
tracing = "0.1.44"
x25519-dalek = { version = "2.0.1", features = ["static_secrets"] }
chacha20poly1305 = "0.10.1"
hkdf = "0.12.4"
sha2 = "0.10.9"
rand_core = { version = "0.6.4", features = ["getrandom"] }
tokio = { version = "1", features = ["rt-multi-thread", "macros"] }
ark-std = "0.6.0"
postcard = { version = "1.1.3", features = ["use-std"] }
serde = "1.0.228"
taceo-poseidon2 = { path = "../../../../eddsa-babyjubjub/poseidon2", features = [
    "t2",
    "t3",
    "t4",
    "t8",
] }
serde_with = "3.21.0"
ark-serialize = "0.6.0"
brotli = "8.0.4"
hex = "0.4.3"

[dev-dependencies]
circuit-profiler = { path = "../circuit-profiler" }
alloy-node-bindings = "1.6.0"
alloy-signer-local = "1.6.0"
anyhow = "1.0.103"
insta = "1.48.0"
serde_json = "1.0"
criterion = "0.8.2"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
alloy-contract = "1.6.0"

[[bench]]
name = "groth16_constraints"
harness = false

[[bench]]
name = "groth16_matrices"
harness = false

[target.'cfg(target_arch = "wasm32")'.dependencies]
getrandom_02 = { package = "getrandom", version = "0.2", features = ["js"] }
