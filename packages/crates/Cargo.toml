[workspace]
members = ["tint", "tint-aml", "circuit-profiler"]
resolver = "3"

[workspace.lints.clippy]
pedantic = { level = "warn", priority = -1 }

[workspace.dependencies]
tint = { path = "./tint" }
alloy-primitives = "1.6.0"
alloy-provider = "1.6.0"
alloy-rpc-types-eth = "1.6.0"
alloy-sol-macro = { version = "1.6.0" }
alloy-sol-types = "1.6.0"
ark-bn254 = { version = "0.6.0", default-features = false }
ark-ff = { version = "0.6.0", default-features = false }
ark-groth16 = { version = "0.6.0", default-features = false }
ark-snark = { version = "0.6.0", default-features = false }
ark-r1cs-std = { version = "0.6.0", default-features = false }
ark-relations = { version = "0.6.0", default-features = false }
ark-ed-on-bn254 = { version = "0.6.0", default-features = false }
async-trait = "0.1.89"
ruint = { version = "1.19.0" }
thiserror = "2.0.18"
tracing = "0.1.44"
x25519-dalek = { version = "2.0.1" }
chacha20poly1305 = "0.10.1"
hkdf = "0.12.4"
sha2 = "0.10.9"
rand_core = { version = "0.6.4" }
tokio = { version = "1" }
ark-std = "0.6.0"
postcard = { version = "1.1.3" }
serde = "1.0.228"
taceo-poseidon2 = { path = "../../../eddsa-babyjubjub/poseidon2" }
serde_with = "3.21.0"
ark-serialize = "0.6.0"
brotli = "8.0.4"
circuit-profiler = { path = "./circuit-profiler" }
alloy-node-bindings = "1.6.0"
alloy-signer-local = "1.6.0"
anyhow = "1.0.103"
insta = "1.48.0"
serde_json = "1.0"
criterion = "0.8.2"
tracing-subscriber = { version = "0.3" }
alloy-contract = "1.6.0"
